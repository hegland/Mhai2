# Hermes Agent Configuration — Mhai2

model:
  default: "claude-haiku-4-5"
  provider: "anthropic"

auxiliary:
  vision:
    provider: "anthropic"
    model: "claude-haiku-4-5"
  web_extract:
    provider: "anthropic"
    model: "claude-haiku-4-5"
  session_search:
    provider: "anthropic"
    model: "claude-haiku-4-5"
  compression:
    provider: "anthropic"
    model: "claude-haiku-4-5"

compression:
  enabled: true
  threshold: 0.30
  target_ratio: 0.15
  protect_last_n: 10
  protect_first_n: 2
  hygiene_hard_message_limit: 200
  abort_on_summary_failure: false

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

session_reset:
  mode: both
  idle_minutes: 60
  at_hour: 4

terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  lifetime_seconds: 300

agent:
  max_turns: 60
  verbose: false
  reasoning_effort: "medium"

prompt_caching:
  cache_ttl: "1h"

skills:
  creation_nudge_interval: 15

stt:
  enabled: true
  local:
    model: "base"

display:
  compact: false
  tool_progress: all
  streaming: true

hooks:
  pre_gateway_dispatch:
    - command: "python3 /home/hegland/.hermes/hooks/project_reset.py"
      timeout: 5

hooks_auto_accept: true

platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]
